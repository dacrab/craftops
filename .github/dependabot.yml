version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "02:00"
      timezone: "Europe/Athens"
    open-pull-requests-limit: 3
    groups:
      all-non-major:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "02:15"
      timezone: "Europe/Athens"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns: ["*"]
    labels:
      - "dependencies"

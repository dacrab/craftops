version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  go: '1.25.10'

linters:
  enable-all: false
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - gosec
    - misspell
    - revive
    - bodyclose
    - unconvert
    - goconst
    - gocritic
    - perfsprint
    - intrange
    - copyloopvar

linters-settings:
  govet:
    enable-all: true
    disable:
      - shadow
  gosec:
    excludes:
      - G104
      - G115
      - G703
      - G704
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
